<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0f0a1a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c6af7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#7c6af7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c6af7;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="dotGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c6af7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#7c6af7" stroke-width="0.5">
    <line x1="0" y1="85" x2="1200" y2="85"/>
    <line x1="0" y1="170" x2="1200" y2="170"/>
    <line x1="0" y1="255" x2="1200" y2="255"/>
    <line x1="300" y1="0" x2="300" y2="340"/>
    <line x1="600" y1="0" x2="600" y2="340"/>
    <line x1="900" y1="0" x2="900" y2="340"/>
  </g>

  <!-- Glowing orb behind text -->
  <ellipse cx="600" cy="165" rx="280" ry="110" fill="#7c6af7" opacity="0.04" filter="url(#subtleGlow)"/>

  <!-- Top separator line -->
  <rect x="0" y="0" width="1200" height="1" fill="url(#lineGrad)" opacity="0.3"/>

  <!-- Agent nodes — left side -->
  <!-- Proposer -->
  <g opacity="0.9">
    <rect x="48" y="80" width="140" height="52" rx="10" fill="#111118" stroke="#7c6af7" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="118" y="99" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#7c6af7" text-anchor="middle" letter-spacing="1">PROPOSER</text>
    <text x="118" y="117" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#555566" text-anchor="middle">Llama 3.3 70B · Groq</text>
    <circle cx="48" cy="106" r="4" fill="#7c6af7" opacity="0.6"/>
  </g>

  <!-- Challenger -->
  <g opacity="0.9">
    <rect x="48" y="148" width="140" height="52" rx="10" fill="#111118" stroke="#ef4444" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="118" y="167" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#ef4444" text-anchor="middle" letter-spacing="1">CHALLENGER</text>
    <text x="118" y="185" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#555566" text-anchor="middle">Gemma 3 27B · Google</text>
    <circle cx="48" cy="174" r="4" fill="#ef4444" opacity="0.6"/>
  </g>

  <!-- Arbitrator -->
  <g opacity="0.9">
    <rect x="48" y="216" width="140" height="52" rx="10" fill="#111118" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="118" y="235" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle" letter-spacing="1">ARBITRATOR</text>
    <text x="118" y="253" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#555566" text-anchor="middle">Qwen 3 235B · Cerebras</text>
    <circle cx="48" cy="242" r="4" fill="#f59e0b" opacity="0.6"/>
  </g>

  <!-- Connecting lines from agents to center -->
  <line x1="188" y1="106" x2="350" y2="160" stroke="#7c6af7" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="3 3"/>
  <line x1="188" y1="174" x2="350" y2="170" stroke="#ef4444" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="3 3"/>
  <line x1="188" y1="242" x2="350" y2="185" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="3 3"/>

  <!-- CENTER: Main title -->
  <!-- "Maieo" in deep lavender -->
  <text
    x="350"
    y="195"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="112"
    font-weight="700"
    fill="#7c6af7"
    letter-spacing="-3"
    filter="url(#glow)"
  >Maieo</text>

  <!-- "AI" in white -->
  <text
    x="685"
    y="195"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="112"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-3"
    filter="url(#glow)"
  >AI</text>

  <!-- Tagline -->
  <text
    x="600"
    y="232"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="15"
    font-weight="400"
    fill="#6b6b88"
    text-anchor="middle"
    letter-spacing="3"
  >MULTI-AGENT ADVERSARIAL REASONING ENGINE</text>

  <!-- Right side: Synthesizer + arrow out -->
  <line x1="850" y1="170" x2="1012" y2="170" stroke="#10b981" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="3 3"/>

  <g opacity="0.9">
    <rect x="1014" y="144" width="148" height="52" rx="10" fill="#111118" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="1088" y="163" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#10b981" text-anchor="middle" letter-spacing="1">SYNTHESIZER</text>
    <text x="1088" y="181" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" fill="#555566" text-anchor="middle">Gemini 2.5 Flash · Google</text>
    <circle cx="1162" cy="170" r="4" fill="#10b981" opacity="0.6"/>
  </g>

  <!-- Bottom separator line -->
  <rect x="0" y="339" width="1200" height="1" fill="url(#lineGrad)" opacity="0.3"/>

  <!-- Bottom pill badges -->
  <rect x="390" y="270" width="90" height="24" rx="12" fill="#7c6af7" fill-opacity="0.12" stroke="#7c6af7" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="435" y="286" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#7c6af7" text-anchor="middle" font-weight="500">4 AI Models</text>

  <rect x="494" y="270" width="90" height="24" rx="12" fill="#7c6af7" fill-opacity="0.12" stroke="#7c6af7" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="539" y="286" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#7c6af7" text-anchor="middle" font-weight="500">Open Source</text>

  <rect x="598" y="270" width="90" height="24" rx="12" fill="#7c6af7" fill-opacity="0.12" stroke="#7c6af7" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="643" y="286" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#7c6af7" text-anchor="middle" font-weight="500">100% Free</text>

  <rect x="702" y="270" width="108" height="24" rx="12" fill="#7c6af7" fill-opacity="0.12" stroke="#7c6af7" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="756" y="286" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#7c6af7" text-anchor="middle" font-weight="500">Full Stack App</text>
</svg>
