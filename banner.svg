<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#111118;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a12;stop-opacity:1" />
    </linearGradient>

    <!-- Purple glow filter -->
    <filter id="purpleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft white glow -->
    <filter id="whiteGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Ambient purple halo behind text -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C6AF7;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#7C6AF7;stop-opacity:0"/>
    </radialGradient>

    <!-- Shimmer gradient for "Mind" text -->
    <linearGradient id="mindShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#e8e0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Shimmer for "Mesh." text -->
    <linearGradient id="meshShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C6AF7;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7C6AF7;stop-opacity:1"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Underline gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#7C6AF7;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#a78bfa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1"/>
    </linearGradient>

    <clipPath id="svgBound">
      <rect width="900" height="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Border -->
  <rect width="900" height="200" fill="none" stroke="#7C6AF7" stroke-width="1.5" stroke-opacity="0.3" rx="12"/>

  <!-- Top-left subtle corner accent -->
  <line x1="0" y1="0" x2="80" y2="0" stroke="#7C6AF7" stroke-width="2" stroke-opacity="0.6" rx="12"/>
  <line x1="0" y1="0" x2="0" y2="60" stroke="#7C6AF7" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="900" y1="0" x2="820" y2="0" stroke="#7C6AF7" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="900" y1="0" x2="900" y2="60" stroke="#7C6AF7" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="0" y1="200" x2="80" y2="200" stroke="#7C6AF7" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="0" y1="200" x2="0" y2="140" stroke="#7C6AF7" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="900" y1="200" x2="820" y2="200" stroke="#7C6AF7" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="900" y1="200" x2="900" y2="140" stroke="#7C6AF7" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Ambient purple halo glow behind text -->
  <ellipse cx="450" cy="95" rx="300" ry="80" fill="url(#halo)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Floating particles (dots) clipped to banner -->
  <g clip-path="url(#svgBound)" opacity="0.5">
    <circle cx="80" cy="40" r="2" fill="#7C6AF7" opacity="0.6">
      <animate attributeName="cy" values="40;30;40" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="160" r="1.5" fill="#a78bfa" opacity="0.5">
      <animate attributeName="cy" values="160;150;160" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="50" r="2" fill="#7C6AF7" opacity="0.5">
      <animate attributeName="cy" values="50;40;50" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="150" r="1.5" fill="#a78bfa" opacity="0.6">
      <animate attributeName="cy" values="150;140;150" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="25" r="1.5" fill="#7C6AF7" opacity="0.4">
      <animate attributeName="cy" values="25;18;25" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="130" r="1" fill="#a78bfa" opacity="0.4">
      <animate attributeName="cy" values="130;122;130" dur="6s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="670" cy="165" r="1.5" fill="#7C6AF7" opacity="0.5">
      <animate attributeName="cy" values="165;156;165" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Subtle grid lines for tech aesthetic -->
  <line x1="0" y1="100" x2="900" y2="100" stroke="#7C6AF7" stroke-width="0.3" stroke-opacity="0.15" stroke-dasharray="4 8"/>

  <!-- Main title: "Mind" in white shimmer -->
  <text
    x="450"
    y="118"
    font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="90"
    font-weight="800"
    letter-spacing="-2"
    text-anchor="middle"
    fill="url(#mindShimmer)"
    filter="url(#whiteGlow)"
  >
    <tspan dx="-5">Mind</tspan><tspan fill="url(#meshShimmer)" filter="url(#purpleGlow)" dx="2">Mesh.</tspan>
  </text>

  <!-- Underline accent -->
  <rect x="200" y="138" width="500" height="2.5" rx="2" fill="url(#lineGrad)">
    <animate attributeName="width" values="0;500;500" dur="1.5s" fill="freeze"/>
    <animate attributeName="x" values="450;200;200" dur="1.5s" fill="freeze"/>
  </rect>

  <!-- Tagline -->
  <text
    x="450"
    y="172"
    font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="15"
    font-weight="400"
    letter-spacing="3"
    text-anchor="middle"
    fill="#888899"
  >
    THE MULTI-AGENT ADVERSARIAL REASONING ENGINE
  </text>
</svg>
